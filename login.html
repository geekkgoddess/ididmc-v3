<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — I Did My Chores</title>
  <link rel="stylesheet" href="css/site.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 100px 24px 48px;
    }
    .login-box {
      width: 100%; max-width: 420px;
    }
    .auth-toggle {
      display: flex; background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 4px; margin-bottom: 24px;
    }
    .auth-toggle button {
      flex: 1; padding: 10px; background: none; border: none;
      border-radius: 9px; color: var(--muted);
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .auth-toggle button.active { background: var(--gold); color: #000; }
    .error-msg {
      background: var(--red-dim);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--red);
      margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin: 16px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .btn-google {
      width: 100%; padding: 13px; background: #fff; color: #111;
      border: 1px solid #ddd; border-radius: 12px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px; transition: all 0.15s;
    }
    .btn-google:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:32px">
      <a href="/" style="font-size:22px;font-weight:800;letter-spacing:-0.3px">
        🧹 I Did My <span style="color:var(--gold)">Chores</span>
      </a>
      <p style="font-size:14px;color:var(--muted);margin-top:8px">Parent accounts only · Kids use the household link</p>
    </div>

    <div class="auth-toggle">
      <button id="tab-login" class="active" onclick="setTab('login')">Log In</button>
      <button id="tab-signup" onclick="setTab('signup')">Sign Up</button>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="form-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="form-field">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label>Password</label>
        <a href="#" onclick="openForgotPassword(); return false;" style="font-size:12px;color:var(--gold)">Forgot?</a>
      </div>
      <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="signup-extras" style="display:none">
      <div class="form-field">
        <label>Confirm Password</label>
        <input type="password" id="auth-password2" placeholder="••••••••">
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px"
            id="auth-btn" onclick="submitAuth()">Log In</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn-google" style="margin-top:8px;background:#f0f0f0;color:#333" onclick="signInGoogleNewAccount()">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/>
        <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/>
        <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/>
        <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/>
      </svg>
      Sign in with Different Account
    </button>

    <p style="font-size:12px;color:var(--muted);text-align:center;margin-top:20px;line-height:1.6">
      By continuing you agree to our
      <a href="/pages/terms.html" style="color:var(--gold)">Terms</a> and
      <a href="/pages/privacy.html" style="color:var(--gold)">Privacy Policy</a>.
    </p>

    <p style="font-size:13px;text-align:center;margin-top:16px;color:var(--muted)">
      <a href="/" style="color:var(--gold)">← Back to home</a>
    </p>
  </div>

  <!-- Password Reset Modal -->
  <div id="reset-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center">
    <div style="background:var(--bg);border-radius:16px;padding:32px;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,0.3)">
      <h2 style="margin-bottom:8px">Reset Password</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px">Enter your email address and we'll send you a link to reset your password.</p>

      <div id="reset-error-msg" class="error-msg"></div>

      <div class="form-field">
        <label>Email</label>
        <input type="email" id="reset-email" placeholder="you@email.com" autocomplete="email">
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:8px" onclick="sendResetEmail()">Send Reset Link</button>
      <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="closeForgotPassword()">Back to Login</button>
    </div>
  </div>
</div>

<script src="js/site.js"></script>
<script type="module">
import { auth, googleProvider } from './app/js/firebase.js';
import {
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInWithPopup,
  onAuthStateChanged,
  sendPasswordResetEmail
} from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';
import { db } from './app/js/firebase.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

// Check if already logged in
onAuthStateChanged(auth, async (user) => {
  if (user) {
    try {
      const snap = await getDoc(doc(db, 'households', user.uid));
      if (snap.exists() && snap.data().onboardingComplete) {
        window.location.href = '/app/pages/parent-dashboard.html';
      } else {
        window.location.href = '/app/pages/onboarding.html';
      }
    } catch(e) {
      console.error('Firestore error:', e);
      // If there's an error fetching household, go to onboarding to set up
      window.location.href = '/app/pages/onboarding.html';
    }
  }
});

window.setTab = (tab) => {
  const isSignup = tab === 'signup';
  document.getElementById('tab-login').classList.toggle('active', !isSignup);
  document.getElementById('tab-signup').classList.toggle('active', isSignup);
  document.getElementById('signup-extras').style.display = isSignup ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = isSignup ? 'Create Account' : 'Log In';
  hideError();
};

// Pre-fill signup tab if ?signup=true
const params = new URLSearchParams(window.location.search);
if (params.get('signup') === 'true') setTab('signup');

window.submitAuth = async () => {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const isSignup = document.getElementById('tab-signup').classList.contains('active');
  const btn      = document.getElementById('auth-btn');
  if (!email || !password) { showError('Please fill in all fields.'); return; }
  btn.disabled = true;
  btn.textContent = isSignup ? 'Creating account…' : 'Logging in…';
  try {
    if (isSignup) {
      const pw2 = document.getElementById('auth-password2').value;
      if (password !== pw2) { showError('Passwords do not match.'); btn.disabled=false; btn.textContent='Create Account'; return; }
      await createUserWithEmailAndPassword(auth, email, password);
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
    // Auth successful - the onAuthStateChanged listener will handle the redirect
  } catch(e) {
    showError(friendlyError(e.code));
    btn.disabled = false;
    btn.textContent = isSignup ? 'Create Account' : 'Log In';
  }
};

window.signInGoogle = async () => {
  try {
    await signInWithPopup(auth, googleProvider);
  } catch(e) {
    showError(friendlyError(e.code));
  }
};

window.signInGoogleNewAccount = async () => {
  try {
    // Force Google to show account picker by clearing cached account
    googleProvider.setCustomParameters({
      prompt: 'select_account'
    });
    await signInWithPopup(auth, googleProvider);
    // Reset prompt after sign-in
    googleProvider.setCustomParameters({
      prompt: ''
    });
  } catch(e) {
    showError(friendlyError(e.code));
    // Reset prompt on error too
    googleProvider.setCustomParameters({
      prompt: ''
    });
  }
};

window.openForgotPassword = () => {
  hideError();
  document.getElementById('reset-modal').style.display = 'flex';
  document.getElementById('reset-email').value = document.getElementById('auth-email').value;
  document.getElementById('reset-email').focus();
};

window.closeForgotPassword = () => {
  document.getElementById('reset-modal').style.display = 'none';
  document.getElementById('reset-email').value = '';
  hideResetError();
};

window.sendResetEmail = async () => {
  const email = document.getElementById('reset-email').value.trim();
  const btn = document.querySelector('#reset-modal .btn-primary');
  if (!email) { showResetError('Please enter your email address.'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending…';
  hideResetError();
  try {
    await sendPasswordResetEmail(auth, email);
    showResetError('Reset link sent! Check your email for instructions.');
    setTimeout(() => closeForgotPassword(), 2000);
  } catch(e) {
    showResetError(friendlyResetError(e.code));
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  }
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }

function showResetError(msg) {
  const el = document.getElementById('reset-error-msg');
  el.textContent = msg; el.classList.add('show');
}
function hideResetError() { document.getElementById('reset-error-msg').classList.remove('show'); }

function friendlyResetError(code) {
  const map = {
    'auth/user-not-found': 'No account found with that email.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/network-request-failed': 'Network error — check your connection.',
  };
  return map[code] || 'Unable to send reset email. Please try again.';
}

function friendlyError(code) {
  const map = {
    'auth/user-not-found':       'No account found with that email.',
    'auth/wrong-password':       'Incorrect password.',
    'auth/email-already-in-use': 'An account with that email already exists.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/weak-password':        'Password must be at least 6 characters.',
    'auth/popup-closed-by-user': 'Sign-in cancelled.',
    'auth/network-request-failed': 'Network error — check your connection.',
    'auth/invalid-credential':   'Incorrect email or password.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
