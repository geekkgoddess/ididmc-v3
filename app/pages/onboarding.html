<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#090909">
  <title>Setup — I Did My Chores</title>
  <link rel="stylesheet" href="../../css/app.css">
  <style>
    #app { max-width: 520px; }
    .screen { padding: 24px 18px 42px; }
    .setup-shell {
      width: 100%;
      min-height: calc(100vh - 66px);
      display: flex;
      flex-direction: column;
    }
    .setup-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
    }
    .setup-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .setup-logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--gold-dim);
      border: 1px solid rgba(245,200,66,0.24);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .setup-title {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }
    .setup-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .skip-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .skip-btn:hover { border-color: var(--gold); color: var(--gold); }
    .step-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    .step-pip {
      flex: 1;
      height: 5px;
      border-radius: 99px;
      background: var(--border);
      transition: background 0.2s;
    }
    .step-pip.done { background: var(--green); }
    .step-pip.active { background: var(--gold); }
    .setup-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
    }
    .setup-hero-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--gold), #fb923c);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 18px;
    }
    .setup-card h1 {
      font-size: 26px;
      letter-spacing: 0;
      margin-bottom: 10px;
    }
    .setup-card p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .setup-actions {
      margin-top: 22px;
      display: grid;
      gap: 10px;
    }
    .setup-grid {
      display: grid;
      gap: 12px;
    }
    .choice-grid {
      display: grid;
      gap: 10px;
    }
    .choice-card {
      width: 100%;
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      color: var(--text);
      font-family: inherit;
      text-align: left;
      cursor: pointer;
    }
    .choice-card.selected {
      border-color: var(--gold);
      background: var(--gold-dim);
    }
    .choice-card strong {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .choice-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .info-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: var(--gold);
      color: #111;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
    }
    .summary-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .summary-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .summary-name {
      font-size: 14px;
      font-weight: 800;
    }
    .summary-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .remove-mini {
      background: transparent;
      border: 1px solid rgba(248,113,113,0.28);
      color: var(--red);
      border-radius: 8px;
      padding: 6px 9px;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .note-box {
      border: 1px solid rgba(245,200,66,0.22);
      background: var(--gold-dim);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      margin-top: 14px;
    }
    .field { margin-bottom: 14px; }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
    }
    .swatch.sel { border-color: #fff; }
    .add-btn {
      width: 100%;
      padding: 13px;
      background: var(--card2);
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .add-btn:hover { border-color: var(--gold); color: var(--gold); }
    .modal-sheet { max-height: 86vh; overflow-y: auto; }
    .pin-row { display: flex; gap: 8px; }
    .pin-digit {
      width: 56px;
      height: 56px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
    }
    .info-modal-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin: 12px 0 0;
    }
    @media (max-width: 430px) {
      .screen { padding: 20px 14px 34px; }
      .setup-card { padding: 18px; border-radius: 16px; }
      .setup-card h1 { font-size: 23px; }
      .field-row { grid-template-columns: 1fr; }
      .pin-digit { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="toast"></div>

  <div id="screen-onboarding" class="screen active">
    <div class="setup-shell">
      <div class="setup-top">
        <div class="setup-brand">
          <div class="setup-logo">🧹</div>
          <div>
            <div class="setup-title">I Did My Chores</div>
            <div class="setup-subtitle" id="step-caption">Guided setup</div>
          </div>
        </div>
        <button class="skip-btn" onclick="setupLater()">Set Up Later</button>
      </div>
      <div class="step-bar" id="step-bar"></div>
      <div id="step-content"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-kid">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 style="margin-bottom:18px">Add a Child</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" id="kid-name-input" placeholder="e.g. Janai" maxlength="20">
      </div>
      <div class="field">
        <label>4-Digit PIN</label>
        <div class="pin-row" id="add-pin-row">
          <input class="pin-digit" maxlength="1" type="tel" inputmode="numeric">
          <input class="pin-digit" maxlength="1" type="tel" inputmode="numeric">
          <input class="pin-digit" maxlength="1" type="tel" inputmode="numeric">
          <input class="pin-digit" maxlength="1" type="tel" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>Avatar Color</label>
        <div class="color-picker" id="kid-color-picker"></div>
      </div>
      <button class="btn btn-primary" onclick="saveKid()">Add Child</button>
      <button class="btn btn-ghost mt-8" onclick="closeModal('modal-kid')">Cancel</button>
    </div>
  </div>

  <div class="modal-overlay" id="modal-chore">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 style="margin-bottom:18px">Add a Chore</h2>
      <div class="field">
        <label>Chore Name</label>
        <input type="text" id="chore-name-input" placeholder="e.g. Vacuum Living Room" maxlength="40">
      </div>
      <div class="field" id="chore-value-field">
        <label id="chore-value-label">Points Value</label>
        <input type="number" id="chore-value-input" placeholder="50" min="0" step="1">
      </div>
      <div class="field">
        <label>What Does Done Mean?</label>
        <textarea id="chore-desc-input" placeholder="e.g. Clear the counter, wipe crumbs, and put dishes away." maxlength="240" style="height:86px;resize:none"></textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Frequency</label>
          <select id="chore-freq-input">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="as-needed">As Needed</option>
          </select>
        </div>
        <div class="field">
          <label>Assigned To</label>
          <select id="chore-assign-input">
            <option value="any">Any kid</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveChore()">Add Chore</button>
      <button class="btn btn-ghost mt-8" onclick="closeModal('modal-chore')">Cancel</button>
    </div>
  </div>

  <div class="modal-overlay" id="modal-info">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 id="info-title"></h2>
      <p class="info-modal-text" id="info-body"></p>
      <button class="btn btn-primary mt-16" onclick="closeModal('modal-info')">Got It</button>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from '../js/firebase.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';
import { doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

const TOTAL_STEPS = 9;
const AVATAR_COLORS = ['#f472b6','#60a5fa','#34d399','#fb923c','#a78bfa','#f87171','#facc15','#4ade80'];
const STEP_LABELS = [
  'Welcome',
  'Email check',
  'Family details',
  'Children',
  'Compensation',
  'Pay cycle',
  'Approvals',
  'Chores',
  'Ready'
];
const INFO_COPY = {
  beta: {
    title: 'Beta Testing',
    body: 'During beta, bugs may happen because of device differences, internet connection, or setup combinations we have not seen yet. If something looks wrong, take a screenshot or short video and use the support form.'
  },
  compensation: {
    title: 'Compensation Models',
    body: 'Points converts chore points into dollars. Flat Pay gives each chore its own dollar amount. Daily Minimum pays a full-day amount after a child completes enough chores.'
  },
  payCycle: {
    title: 'Pay Cycle',
    body: 'The pay cycle controls how the dashboard groups earnings. Weekly and bi-weekly use an anchor start date. Monthly and semi-monthly follow the calendar. As Needed lets you control dates manually later.'
  },
  approvals: {
    title: 'Approval Mode',
    body: 'Manual Approval means a parent reviews each submission before it counts. Auto Approve means the chore counts as soon as the child submits proof.'
  },
  chores: {
    title: 'Chores',
    body: 'Start with one or two chores so the household can test the full flow. You can add detailed chore lists from the Chores tab after setup.'
  }
};

let currentUser = null;
let currentStep = 0;
let household = {
  name: '',
  parentName: '',
  payFrequency: 'weekly',
  payPeriodStart: new Date().toISOString().split('T')[0],
  payPeriodDays: 7,
  capPerKid: 120,
  bonusBudget: 0,
  compModel: 'points',
  compSettings: { pointsPerDollar: 100 },
  approvalMode: 'manual',
  onboardingComplete: false,
  setupSkipped: false,
  emailSettings: {
    dailySummary: true,
    weeklySummary: true,
    dailyTime: '18:00',
    weeklyDay: 'friday',
    weeklyTime: '18:00',
    perKidEmails: false,
  },
};
let kids = [];
let chores = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '../../login.html'; return; }
  currentUser = user;
  await loadExistingHousehold();
  renderStep();
});

async function loadExistingHousehold() {
  const snap = await getDoc(doc(db, 'households', currentUser.uid));
  if (!snap.exists()) return;
  const data = snap.data();
  household = { ...household, ...data };
  kids = data.kids || [];
  chores = data.chores || [];
  if (data.onboardingComplete) window.location.href = 'parent-dashboard.html';
}

function renderStepBar() {
  document.getElementById('step-caption').textContent = `${STEP_LABELS[currentStep]} · Step ${currentStep + 1} of ${TOTAL_STEPS}`;
  document.getElementById('step-bar').innerHTML = Array.from({ length: TOTAL_STEPS }, (_, i) => {
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    return `<div class="step-pip ${cls}"></div>`;
  }).join('');
}

function renderStep() {
  renderStepBar();
  const content = document.getElementById('step-content');
  const renders = [
    renderWelcome,
    renderVerify,
    renderFamily,
    renderKids,
    renderCompensation,
    renderPayCycle,
    renderApproval,
    renderChores,
    renderFinal
  ];
  content.innerHTML = '';
  renders[currentStep](content);
}

function card(html) {
  return `<div class="setup-card">${html}</div>`;
}

function navButtons({ next = 'Continue', back = true, disabled = false } = {}) {
  return `
    <div class="setup-actions">
      <button class="btn btn-primary" onclick="nextStep()" ${disabled ? 'disabled' : ''}>${next}</button>
      ${back ? '<button class="btn btn-ghost" onclick="goBack()">Back</button>' : ''}
    </div>`;
}

function renderWelcome(el) {
  el.innerHTML = card(`
    <div class="setup-hero-icon">✨</div>
    <h1>Let's set up your household.</h1>
    <p>This works like setting up a new device: one simple screen at a time, with the important choices explained as you go.</p>
    <div class="note-box">
      <strong>Beta note:</strong> You are helping test the site. If anything looks confusing or breaks, screenshots and short videos are very helpful.
      <button class="info-btn" style="margin-left:6px" onclick="openInfo('beta')">i</button>
    </div>
    ${navButtons({ next: 'Start Setup', back: false })}
  `);
}

function renderVerify(el) {
  const email = currentUser?.email || 'your email';
  el.innerHTML = card(`
    <div class="setup-hero-icon">✉️</div>
    <h1>Verify your email.</h1>
    <p>Later, this screen will ask for a verification code sent to <strong style="color:var(--text)">${esc(email)}</strong>. For beta, you can continue without a code.</p>
    <div class="field">
      <label>Verification Code</label>
      <input type="text" placeholder="Coming later" disabled>
    </div>
    <div class="note-box">Email-code verification is planned, but not enforced yet.</div>
    ${navButtons({ next: 'Continue' })}
  `);
}

function renderFamily(el) {
  el.innerHTML = card(`
    <h1>Family details</h1>
    <p>Add the parent contact name, name the household, and set the maximum each child can earn in one pay period.</p>
    <div class="field">
      <label>Parent Name</label>
      <input type="text" id="parent-name" value="${escapeAttr(household.parentName || '')}" placeholder="Your name" maxlength="60">
    </div>
    <div class="field">
      <label>Household Name</label>
      <input type="text" id="family-name" value="${escapeAttr(household.name)}" placeholder='e.g. "The Hodge House"' maxlength="40">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Max Earnings Per Kid</label>
        <input type="number" id="family-cap" value="${household.capPerKid || 120}" min="1" max="999">
      </div>
      <div class="field">
        <label>Bonus Budget</label>
        <input type="number" id="family-bonus" value="${household.bonusBudget || ''}" min="0" max="999" placeholder="Optional">
      </div>
    </div>
    ${navButtons()}
  `);
}

function renderKids(el) {
  el.innerHTML = card(`
    <h1>Add children</h1>
    <p>Each child gets their own 4-digit PIN for the kid dashboard. You can add more later in Settings.</p>
    <div id="kids-list"></div>
    <button class="add-btn" onclick="openAddKid()">+ Add Child</button>
    ${navButtons({ disabled: kids.length === 0 })}
  `);
  renderKidsList();
}

function renderCompensation(el) {
  const cs = household.compSettings || {};
  el.innerHTML = card(`
    <h1>Choose compensation</h1>
    <p>Pick how children earn. You can change this later in Settings. <button class="info-btn" onclick="openInfo('compensation')">i</button></p>
    <div class="choice-grid">
      ${choice('points', 'A - Points', 'Each chore earns points. Points convert into dollars.')}
      ${choice('flat', 'B - Flat Pay', 'Each chore has its own dollar amount.')}
      ${choice('daily-min', 'C - Daily Minimum', 'All chores count equally. Complete enough chores to earn full-day pay.')}
    </div>
    <div id="comp-fields" style="margin-top:16px"></div>
    ${navButtons()}
  `);
  renderCompFields();
}

function renderPayCycle(el) {
  el.innerHTML = card(`
    <h1>Pay cycle</h1>
    <p>Choose how earnings are grouped. <button class="info-btn" onclick="openInfo('payCycle')">i</button></p>
    <div class="field">
      <label>Pay Frequency</label>
      <select id="pay-frequency" onchange="togglePayFields()">
        <option value="weekly" ${household.payFrequency === 'weekly' ? 'selected' : ''}>Weekly</option>
        <option value="biweekly" ${household.payFrequency === 'biweekly' ? 'selected' : ''}>Every 2 weeks</option>
        <option value="semimonthly" ${household.payFrequency === 'semimonthly' ? 'selected' : ''}>Twice a month</option>
        <option value="monthly" ${household.payFrequency === 'monthly' ? 'selected' : ''}>Monthly</option>
        <option value="asneeded" ${household.payFrequency === 'asneeded' ? 'selected' : ''}>As Needed</option>
      </select>
    </div>
    <div id="pay-fields"></div>
    ${navButtons()}
  `);
  togglePayFields();
}

function renderApproval(el) {
  el.innerHTML = card(`
    <h1>Approval mode</h1>
    <p>Decide whether chores need parent review. <button class="info-btn" onclick="openInfo('approvals')">i</button></p>
    <div class="choice-grid">
      <button class="choice-card ${household.approvalMode === 'manual' ? 'selected' : ''}" onclick="selectApproval('manual')">
        <strong>Manual Approval</strong>
        <span>You approve or reject each submission before it counts.</span>
      </button>
      <button class="choice-card ${household.approvalMode === 'automatic' || household.approvalMode === 'auto' ? 'selected' : ''}" onclick="selectApproval('automatic')">
        <strong>Auto Approve</strong>
        <span>Submissions count immediately after kids submit proof.</span>
      </button>
    </div>
    ${navButtons()}
  `);
}

function renderChores(el) {
  el.innerHTML = card(`
    <h1>Add one or two chores</h1>
    <p>Start small so you can test the full flow. You can build the full chore list later. <button class="info-btn" onclick="openInfo('chores')">i</button></p>
    <div id="chores-list"></div>
    <button class="add-btn" onclick="openAddChore()">+ Add Chore</button>
    ${navButtons({ next: chores.length ? 'Continue' : 'Skip for Now' })}
  `);
  renderChoresList();
}

function renderFinal(el) {
  el.innerHTML = card(`
    <div class="setup-hero-icon">✅</div>
    <h1>Ready to start.</h1>
    <p>Your dashboard will show what still needs attention and give you the link to share with kids.</p>
    <div class="summary-list">
      <div class="summary-item"><div><div class="summary-name">${esc(household.name || 'Household')}</div><div class="summary-sub">Household</div></div></div>
      <div class="summary-item"><div><div class="summary-name">${kids.length}</div><div class="summary-sub">Children added</div></div></div>
      <div class="summary-item"><div><div class="summary-name">${chores.length}</div><div class="summary-sub">Chores added</div></div></div>
      <div class="summary-item"><div><div class="summary-name">${compLabel(household.compModel)}</div><div class="summary-sub">Compensation model</div></div></div>
    </div>
    <div class="setup-actions">
      <button class="btn btn-primary" id="finish-btn" onclick="finishOnboarding()">Launch Dashboard</button>
      <button class="btn btn-ghost" onclick="goBack()">Back</button>
    </div>
  `);
}

function choice(value, title, description) {
  return `
    <button class="choice-card ${household.compModel === value ? 'selected' : ''}" onclick="selectCompModel('${value}')">
      <strong>${title}</strong>
      <span>${description}</span>
    </button>`;
}

function renderCompFields() {
  const cs = household.compSettings || {};
  const el = document.getElementById('comp-fields');
  if (!el) return;
  if (household.compModel === 'flat') {
    el.innerHTML = `
      <div class="field">
        <label>Daily Earning Cap ($)</label>
        <input type="number" id="comp-cap-amount" value="${cs.dailyCapAmount || ''}" placeholder="Optional" min="0" step="0.01">
      </div>`;
  } else if (household.compModel === 'daily-min') {
    el.innerHTML = `
      <div class="field-row">
        <div class="field">
          <label>Chores for Full Day</label>
          <input type="number" id="comp-chore-min" value="${cs.choreMinForFullDay || 5}" min="1">
        </div>
        <div class="field">
          <label>Full Day Pay ($)</label>
          <input type="number" id="comp-full-day-pay" value="${cs.fullDayPay || ''}" placeholder="10.00" min="0" step="0.01">
        </div>
      </div>`;
  } else {
    el.innerHTML = `
      <div class="field-row">
        <div class="field">
          <label>Points per $1</label>
          <input type="number" id="comp-pts-dollar" value="${cs.pointsPerDollar || 100}" min="1">
        </div>
        <div class="field">
          <label>Daily Min Points</label>
          <input type="number" id="comp-daily-min" value="${cs.dailyMinPoints || ''}" placeholder="Optional" min="0">
        </div>
      </div>`;
  }
}

window.selectCompModel = (model) => {
  saveCompFields();
  household.compModel = model;
  if (!household.compSettings) household.compSettings = {};
  renderStep();
};

function saveCompFields() {
  const cs = {};
  if (household.compModel === 'flat') {
    cs.dailyCapEnabled = !!document.getElementById('comp-cap-amount')?.value;
    cs.dailyCapAmount = parseFloat(document.getElementById('comp-cap-amount')?.value) || null;
  } else if (household.compModel === 'daily-min') {
    cs.choreMinForFullDay = parseInt(document.getElementById('comp-chore-min')?.value) || 5;
    cs.fullDayPay = parseFloat(document.getElementById('comp-full-day-pay')?.value) || null;
  } else {
    cs.pointsPerDollar = parseInt(document.getElementById('comp-pts-dollar')?.value) || 100;
    cs.dailyMinPoints = parseInt(document.getElementById('comp-daily-min')?.value) || null;
  }
  household.compSettings = cs;
  if (cs.pointsPerDollar) household.pointMultiplier = cs.pointsPerDollar;
}

window.togglePayFields = () => {
  const freq = document.getElementById('pay-frequency')?.value || household.payFrequency || 'weekly';
  const el = document.getElementById('pay-fields');
  if (!el) return;
  if (freq === 'weekly' || freq === 'biweekly') {
    el.innerHTML = `
      <div class="field">
        <label>Anchor Start Date</label>
        <input type="date" id="pay-start" value="${household.payPeriodStart || new Date().toISOString().split('T')[0]}">
      </div>`;
  } else if (freq === 'asneeded') {
    el.innerHTML = `
      <div class="field-row">
        <div class="field">
          <label>Current Start</label>
          <input type="date" id="pay-current-start" value="${household.currentPeriodStart || new Date().toISOString().split('T')[0]}">
        </div>
        <div class="field">
          <label>Current End</label>
          <input type="date" id="pay-current-end" value="${household.currentPeriodEnd || ''}">
        </div>
      </div>`;
  } else {
    el.innerHTML = '<div class="note-box">This pay cycle follows the calendar. You can adjust details later in Settings.</div>';
  }
};

function saveFamilyFields() {
  household.parentName = document.getElementById('parent-name')?.value.trim() || '';
  const name = document.getElementById('family-name')?.value.trim();
  if (!name) { showToast('Please enter a household name'); return false; }
  household.name = name;
  household.capPerKid = parseFloat(document.getElementById('family-cap')?.value) || 120;
  household.bonusBudget = parseFloat(document.getElementById('family-bonus')?.value) || 0;
  return true;
}

function savePayFields() {
  const freq = document.getElementById('pay-frequency')?.value || household.payFrequency || 'weekly';
  household.payFrequency = freq;
  household.payPeriodDays = { weekly: 7, biweekly: 14, semimonthly: 15, monthly: 30, asneeded: 0 }[freq] || 7;
  if (freq === 'weekly' || freq === 'biweekly') {
    const start = document.getElementById('pay-start')?.value;
    if (!start) { showToast('Please choose an anchor start date'); return false; }
    household.payPeriodStart = start;
    household.currentPeriodStart = '';
    household.currentPeriodEnd = '';
  } else if (freq === 'asneeded') {
    const start = document.getElementById('pay-current-start')?.value;
    const end = document.getElementById('pay-current-end')?.value;
    if (!start || !end) { showToast('Please choose start and end dates'); return false; }
    household.payPeriodStart = start;
    household.currentPeriodStart = start;
    household.currentPeriodEnd = end;
  } else {
    household.payPeriodStart = household.payPeriodStart || new Date().toISOString().split('T')[0];
    household.currentPeriodStart = '';
    household.currentPeriodEnd = '';
  }
  return true;
}

window.selectApproval = (mode) => {
  household.approvalMode = mode;
  renderStep();
};

window.nextStep = () => {
  if (currentStep === 2 && !saveFamilyFields()) return;
  if (currentStep === 4) saveCompFields();
  if (currentStep === 5 && !savePayFields()) return;
  if (currentStep === 3 && kids.length === 0) { showToast('Add at least one child or choose Set Up Later'); return; }
  currentStep = Math.min(currentStep + 1, TOTAL_STEPS - 1);
  renderStep();
};

window.goBack = () => {
  currentStep = Math.max(currentStep - 1, 0);
  renderStep();
};

window.setupLater = async () => {
  if (currentStep === 2) {
    const nameInput = document.getElementById('family-name');
    if (nameInput?.value.trim()) household.name = nameInput.value.trim();
  }
  const confirmed = confirm('Finish setup later? Your dashboard will open with a setup checklist.');
  if (!confirmed) return;
  await saveHousehold(false, true);
  window.location.href = 'parent-dashboard.html';
};

window.finishOnboarding = async () => {
  const btn = document.getElementById('finish-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  try {
    await saveHousehold(true, false);
    window.location.href = 'parent-dashboard.html';
  } catch (err) {
    console.error(err);
    showToast('Setup could not be saved. Check your connection.');
    btn.disabled = false;
    btn.textContent = 'Launch Dashboard';
  }
};

async function saveHousehold(complete, skipped) {
  const hData = {
    ...household,
    name: household.name || 'My Household',
    ownerId: currentUser.uid,
    ownerEmail: currentUser.email,
    updatedAt: new Date().toISOString(),
    onboardingComplete: complete,
    setupSkipped: skipped,
    kids,
    chores,
  };
  if (!household.createdAt) hData.createdAt = new Date().toISOString();
  await setDoc(doc(db, 'households', currentUser.uid), hData, { merge: true });
}

window.openAddKid = () => {
  document.getElementById('kid-name-input').value = '';
  document.querySelectorAll('#add-pin-row .pin-digit').forEach(d => d.value = '');
  renderColorPicker();
  document.getElementById('modal-kid').classList.add('active');
  setTimeout(() => document.getElementById('kid-name-input').focus(), 100);
};

function renderColorPicker() {
  const used = kids.map(k => k.color);
  const picker = document.getElementById('kid-color-picker');
  picker.innerHTML = AVATAR_COLORS.map((c, i) => `
    <div class="swatch ${i === 0 ? 'sel' : ''}" style="background:${c};opacity:${used.includes(c) ? 0.45 : 1}" data-color="${c}" onclick="selectColor(this)"></div>
  `).join('');
  const firstFree = [...picker.querySelectorAll('.swatch')].find(s => !used.includes(s.dataset.color));
  if (firstFree) selectColor(firstFree);
};

window.selectColor = (el) => {
  document.querySelectorAll('#kid-color-picker .swatch').forEach(s => s.classList.remove('sel'));
  el.classList.add('sel');
};

window.saveKid = () => {
  const name = document.getElementById('kid-name-input').value.trim();
  const pin = [...document.querySelectorAll('#add-pin-row .pin-digit')].map(d => d.value).join('');
  const color = document.querySelector('#kid-color-picker .sel')?.dataset.color || AVATAR_COLORS[0];
  if (!name) { showToast('Please enter a name'); return; }
  if (!/^\d{4}$/.test(pin)) { showToast('Please enter a 4-digit PIN'); return; }
  if (kids.some(k => k.name.toLowerCase() === name.toLowerCase())) { showToast('That child already exists'); return; }
  kids.push({ id: Date.now().toString(), name, pin, color });
  closeModal('modal-kid');
  renderStep();
};

window.removeKid = (idx) => {
  kids.splice(idx, 1);
  renderStep();
};

function renderKidsList() {
  const list = document.getElementById('kids-list');
  if (!list) return;
  if (!kids.length) {
    list.innerHTML = '<div class="note-box">No children added yet.</div>';
    return;
  }
  list.innerHTML = `<div class="summary-list">${kids.map((kid, i) => `
    <div class="summary-item">
      <div>
        <div class="summary-name">${esc(kid.name)}</div>
        <div class="summary-sub">PIN ${esc(kid.pin)} · ${esc(kid.color)}</div>
      </div>
      <button class="remove-mini" onclick="removeKid(${i})">Remove</button>
    </div>`).join('')}</div>`;
}

window.openAddChore = () => {
  document.getElementById('chore-name-input').value = '';
  document.getElementById('chore-value-input').value = '';
  document.getElementById('chore-desc-input').value = '';
  document.getElementById('chore-freq-input').value = 'daily';
  updateChoreValueLabel();
  updateChoreAssignOptions();
  document.getElementById('modal-chore').classList.add('active');
  setTimeout(() => document.getElementById('chore-name-input').focus(), 100);
};

function updateChoreValueLabel() {
  const field = document.getElementById('chore-value-field');
  const label = document.getElementById('chore-value-label');
  const input = document.getElementById('chore-value-input');
  if (!field || !label || !input) return;
  if (household.compModel === 'daily-min') {
    field.style.display = 'none';
    input.value = '';
  } else if (household.compModel === 'flat') {
    field.style.display = 'block';
    label.textContent = 'Flat Pay ($)';
    input.placeholder = '5.00';
    input.step = '0.01';
  } else {
    field.style.display = 'block';
    label.textContent = 'Points Value';
    input.placeholder = '50';
    input.step = '1';
  }
}

function updateChoreAssignOptions() {
  const sel = document.getElementById('chore-assign-input');
  if (!sel) return;
  sel.innerHTML = '<option value="any">Any kid</option>' +
    kids.map(k => `<option value="${escapeAttr(k.name)}">${esc(k.name)} only</option>`).join('');
}

window.saveChore = () => {
  const name = document.getElementById('chore-name-input').value.trim();
  const value = parseFloat(document.getElementById('chore-value-input').value) || 0;
  const freq = document.getElementById('chore-freq-input').value;
  const assignedTo = document.getElementById('chore-assign-input').value;
  const desc = document.getElementById('chore-desc-input').value.trim();
  if (!name) { showToast('Please enter a chore name'); return; }
  if (household.compModel !== 'daily-min' && value <= 0) { showToast('Please enter a value'); return; }
  chores.push({
    id: Date.now().toString(),
    name,
    desc,
    freq,
    assignedTo,
    subTasks: [],
    pointValue: household.compModel === 'points' ? Math.round(value) : 0,
    flatPayValue: household.compModel === 'flat' ? value : 0,
  });
  closeModal('modal-chore');
  renderStep();
};

window.removeChore = (idx) => {
  chores.splice(idx, 1);
  renderStep();
};

function renderChoresList() {
  const list = document.getElementById('chores-list');
  if (!list) return;
  if (!chores.length) {
    list.innerHTML = '<div class="note-box">No chores added yet. You can skip and add them later from the Chores tab.</div>';
    return;
  }
  list.innerHTML = `<div class="summary-list">${chores.map((chore, i) => `
    <div class="summary-item">
      <div>
        <div class="summary-name">${esc(chore.name)}</div>
        <div class="summary-sub">${choreValueLabel(chore)} · ${esc(chore.freq)} · ${chore.assignedTo === 'any' ? 'Any kid' : esc(chore.assignedTo)}</div>
      </div>
      <button class="remove-mini" onclick="removeChore(${i})">Remove</button>
    </div>`).join('')}</div>`;
}

function choreValueLabel(chore) {
  if (household.compModel === 'flat') return `$${Number(chore.flatPayValue || 0).toFixed(2)}`;
  if (household.compModel === 'daily-min') return '1 unit';
  return `${chore.pointValue || 0} pts`;
}

function compLabel(model) {
  return model === 'flat' ? 'Flat Pay' : model === 'daily-min' ? 'Daily Minimum' : 'Points';
}

window.openInfo = (key) => {
  const copy = INFO_COPY[key];
  if (!copy) return;
  document.getElementById('info-title').textContent = copy.title;
  document.getElementById('info-body').textContent = copy.body;
  document.getElementById('modal-info').classList.add('active');
};

window.closeModal = (id) => {
  document.getElementById(id).classList.remove('active');
};

document.addEventListener('input', (e) => {
  if (!e.target.classList.contains('pin-digit')) return;
  e.target.value = e.target.value.replace(/\D/g, '').slice(0, 1);
  const inputs = [...e.target.closest('.pin-row').querySelectorAll('.pin-digit')];
  const idx = inputs.indexOf(e.target);
  if (e.target.value && idx < inputs.length - 1) inputs[idx + 1].focus();
});

document.addEventListener('keydown', (e) => {
  if (!e.target.classList.contains('pin-digit')) return;
  if (e.key === 'Backspace' && !e.target.value) {
    const inputs = [...e.target.closest('.pin-row').querySelectorAll('.pin-digit')];
    const idx = inputs.indexOf(e.target);
    if (idx > 0) inputs[idx - 1].focus();
  }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeAttr(str) {
  return esc(str).replace(/`/g, '&#96;');
}
</script>
