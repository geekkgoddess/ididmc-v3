[build]
  publish = "."

# App routes
[[redirects]]
  from = "/app"
  to   = "/login.html"
  status = 302

[[redirects]]
  from = "/dashboard"
  to   = "/app/pages/parent-dashboard.html"
  status = 302

# Unsubscribe page (must come before the catch-all)
[[redirects]]
  from = "/unsubscribe"
  to   = "/unsubscribe.html"
  status = 200

# Keep everything else working
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-cache"
    # CSP: allow Firebase SDK + our own Cloud Functions; block everything else
    # 'unsafe-inline' is required because all pages use inline <script type="module">
    # The real XSS protection is the esc() sanitizer on all user data in innerHTML
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://us-central1-i-did-my-chores.cloudfunctions.net https://firebasestorage.googleapis.com wss://*.firebaseio.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'"

# Never cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache CSS/JS longer
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
